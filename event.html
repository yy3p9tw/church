<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招募職缺</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 導覽列固定在最上方，寬度100%，高度螢幕高的1/10 */
        .nav {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 10vh;
          background: #fff;
          z-index: 1000;
          box-shadow: 0 2px 8px rgba(0,0,0,0.06);
          display: flex;
          align-items: center;
        }
        .container {
          padding: 0;
          margin: 0;
        }
        .content-area {
          margin-top: 10vh;
          padding: 0;
        }
        .content {
          width: 100vw;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background: #e3f0ff;
          box-sizing: border-box;
          padding: 0;
        }
        .faith-section {
          width: 100vw;
          min-height: 100vh;
          background: #e3f0ff;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          box-sizing: border-box;
          padding: 0;
        }
        .belief-section {
          width: 100vw;
          min-height: 100vh;
          background: #fffbe3;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          box-sizing: border-box;
          padding: 0;
        }
        .footer {
          width: 100vw;
          min-height: 50vh;
          background: #f2f2f2;
          color: #888;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
        }
        .footer-main {
          display: flex;
          width: 100vw;
          justify-content: space-between;
          align-items: flex-start;
          padding: 2rem 5vw 1rem 5vw;
          box-sizing: border-box;
        }
        .footer-col.left, .footer-col.center, .footer-col.right {
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
        }
        .footer-col.left {
          align-items: flex-start;
        }
        .footer-col.right {
          align-items: flex-end;
        }
        .footer .logo img {
          width: 80px;
          height: auto;
        }
        .footer .social a img {
          width: 32px;
          height: 32px;
          margin-right: 8px;
        }
        .footer .map iframe {
          border-radius: 8px;
        }
        .footer .info {
          font-size: 1rem;
          line-height: 1.8;
        }
        .footer-copyright {
          width: 100vw;
          text-align: center;
          padding: 1rem 0 0.5rem 0;
          font-size: 0.95rem;
          color: #bbb;
        }
        @media (max-width: 900px) {
          .footer-main {
            flex-direction: column;
            align-items: center;
            gap: 2rem;
          }
          .footer-col.left, .footer-col.center, .footer-col.right {
            align-items: center !important;
          }
        }
        @media (max-width: 600px) {
          .nav, .faith-section, .belief-section, .footer {
            width: 100vw;
            min-width: 0;
          }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="dropdown">關於我們
                <div class="dropdown-content">
                    <a href="./about.html">教會簡介</a>
                    <a href="./faith.html">信仰宣言</a>
                </div>
            </div>
            <div class="dropdown">聚會時間
                <div class="dropdown-content">
                    <a href="./sunday.html">主日崇拜</a>
                    <a href="./cell.html">小組聚會</a>
                </div>
            </div>
            <div class="logo">
                <a href="./index.html"><img src="logo.png" alt="教會logo"></a>
            </div>
            <div class="dropdown">公告
                <div class="dropdown-content">
                    <a href="./recent.html">公告</a>
                </div>
            </div>
            <div class="dropdown">週報
                <div class="dropdown-content">
                    <a href="./event.html">週報</a>
                    <a href="#contact2">年度報告</a>
                </div>
            </div>
        </div>
        <div class="content-area">
            <div class="content">
                <h2 id="contact">招募職缺</h2>
                <form style="width:100%;max-width:400px;margin:0 auto;display:flex;flex-direction:column;gap:16px;">
                    <label>姓名：<input type="text" name="name" required style="width:100%;padding:8px;"></label>
                    <label>Email：<input type="email" name="email" required style="width:100%;padding:8px;"></label>
                    <label>應徵職缺：<input type="text" name="subject" style="width:100%;padding:8px;"></label>
                    <label>自我介紹：<textarea name="message" rows="5" required style="width:100%;padding:8px;"></textarea></label>
                    <button type="submit" style="background:#ff9800;color:#fff;padding:10px 0;border:none;border-radius:4px;font-size:1.1em;cursor:pointer;">送出</button>
                </form>
            </div>
        </div>
        <div class="footer">
            <div class="footer-main">
                <div class="footer-col left">
                    <div class="logo">
                        <img src="logo.png" alt="教會logo">
                    </div>
                    <div class="social">
                        <a href="https://www.youtube.com/" target="_blank">
                            <img src="yt_icon.png" alt="YouTube">
                        </a>
                        <a href="https://www.facebook.com/" target="_blank">
                            <img src="fb_icon.png" alt="Facebook">
                        </a>
                    </div>
                </div>
                <div class="footer-col center">
                    <div class="map">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3651.902954624478!2d121.56541731536346!3d25.03396498397225!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3442abbf8e8e8e8f%3A0x8e8e8e8e8e8e8e8e!2z5Y-w5YyX5biC!5e0!3m2!1szh-TW!2stw!4v1680000000000!5m2!1szh-TW!2stw"
                            width="300" height="150" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
                <div class="footer-col right">
                    <div class="info">
                        聯絡信箱: <a href="mailto:contact@church.com">contact@church.com</a><br>
                        聯絡電話: <a href="tel:+123456789">+123 456 789</a><br>
                        地址: 台北市信義區信義路5段100號<br>
                        開放時間: 每週一至週五 9:00 - 17:00
                    </div>
                </div>
            </div>
            <div class="footer-copyright">
                版權所有 &copy; 2025 YU 蘆洲大喜樂基督教會
            </div>
        </div>
    </div>
</body>
</html>
